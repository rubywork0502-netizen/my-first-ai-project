<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script src="auth.js"></script>
<script src="profile.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMSuite — 任務管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
/* ━━━ RESET ━━━ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{cursor:pointer;border:none;background:none;font:inherit}
input,select,textarea{font:inherit;border:none;outline:none;background:none;width:100%}
a{text-decoration:none;color:inherit}
svg{display:block;flex-shrink:0}
[contenteditable]{outline:none}

/* ━━━ DESIGN TOKENS — light-first ━━━ */
:root {
  --bg:#F8FAFC; --s1:#FFFFFF; --s2:#F8FAFC; --s3:#F1F5F9; --s4:#E8EDF4;
  --b1:#E2E8F0; --b2:#CBD5E1; --b3:#94A3B8;
  --t1:#0F172A; --t2:#334155; --t3:#64748B; --t4:#94A3B8;
  --purple:#7C3AED; --purple-d:rgba(124,58,237,.1); --purple-g:rgba(124,58,237,.06);
  --cyan:#0EA5E9;   --cyan-d:rgba(14,165,233,.1);
  --teal:#0D9488;   --teal-d:rgba(13,148,136,.1);
  --green:#10B981;  --green-d:rgba(16,185,129,.12);
  --amber:#F59E0B;  --amber-d:rgba(245,158,11,.12);
  --orange:#F97316; --orange-d:rgba(249,115,22,.12);
  --pink:#EC4899;   --pink-d:rgba(236,72,153,.12);
  --red:#EF4444;    --red-d:rgba(239,68,68,.12);
  --grad-main:linear-gradient(135deg,#7C3AED 0%,#0EA5E9 100%);
  --grad-life:linear-gradient(135deg,#10B981 0%,#0D9488 100%);
  --sb-w:220px; --hdr-h:56px; --r:10px; --r-sm:6px;
  --hdr-bg:rgba(255,255,255,.92);
  --shadow-sm:0 1px 2px rgba(15,23,42,.04),0 4px 8px rgba(15,23,42,.04);
  --shadow-md:0 4px 8px rgba(15,23,42,.08),0 16px 32px rgba(15,23,42,.08);
  --drawer-w:480px;
}
[data-theme="dark"] {
  --bg:#08080f; --s1:#0e0d14; --s2:#141320; --s3:#1c1a2a; --s4:#252336;
  --b1:#1e1c2e; --b2:#2a2840; --b3:#3a3852;
  --t1:#f0edfb; --t2:#9490b0; --t3:#58547a; --t4:#35324a;
  --purple:#c084fc; --purple-d:rgba(192,132,252,.13); --purple-g:rgba(192,132,252,.06);
  --cyan:#38bdf8;   --cyan-d:rgba(56,189,248,.13);
  --teal:#2dd4bf;   --teal-d:rgba(45,212,191,.13);
  --green:#4ade80;  --green-d:rgba(74,222,128,.13);
  --amber:#fbbf24;  --amber-d:rgba(251,191,36,.13);
  --orange:#fb923c; --orange-d:rgba(251,146,60,.13);
  --pink:#f472b6;   --pink-d:rgba(244,114,182,.13);
  --red:#f87171;    --red-d:rgba(248,113,113,.13);
  --grad-main:linear-gradient(135deg,#c084fc 0%,#38bdf8 100%);
  --hdr-bg:rgba(8,8,15,.9);
  --shadow-sm:0 1px 2px rgba(0,0,0,.22),0 4px 16px rgba(0,0,0,.14);
  --shadow-md:0 4px 16px rgba(0,0,0,.3),0 16px 48px rgba(0,0,0,.25);
}

/* ━━━ BASE ━━━ */
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);
  height:100vh;display:flex;overflow:hidden;font-size:14px;line-height:1.5;
  transition:background .28s,color .2s}

/* ━━━ SIDEBAR ━━━ */
.sidebar{width:var(--sb-w);height:100vh;background:var(--s1);
  border-right:1px solid var(--b1);display:flex;flex-direction:column;
  flex-shrink:0;position:relative;z-index:20;overflow:hidden}
.logo{height:var(--hdr-h);display:flex;align-items:center;gap:10px;
  padding:0 18px;border-bottom:1px solid var(--b1);flex-shrink:0}
.logo-icon{width:28px;height:28px;border-radius:7px;background:var(--grad-main);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;color:#fff;flex-shrink:0}
.logo-label{font-family:'Inter',sans-serif;font-weight:700;font-size:15px;color:var(--t1);letter-spacing:-.01em}
.logo-label em{font-style:normal;background:var(--grad-main);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav::-webkit-scrollbar{width:0}
.nav-section{font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t4);padding:14px 10px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--r-sm);color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.nav-item:hover{color:var(--t1);background:var(--s3)}
.nav-item.active{color:var(--purple);background:var(--purple-g);font-weight:600}
.ni{color:var(--t4);transition:color .15s;flex-shrink:0}
.nav-item.active .ni{color:var(--purple)}
.nav-item:hover .ni{color:var(--t2)}
.nav-chip{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  padding:1px 7px;border-radius:10px;background:var(--s3);color:var(--t3);border:1px solid var(--b2)}
.nav-chip.hot{background:var(--red-d);color:var(--red);border-color:transparent}
.sb-footer{padding:10px 8px;border-top:1px solid var(--b1);flex-shrink:0}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--r-sm);cursor:pointer;transition:background .15s}
.user-row:hover{background:var(--s3)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--grad-main);
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--t1)}
.user-role{font-size:11px;color:var(--t3)}

/* ━━━ MAIN ━━━ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.hdr{height:var(--hdr-h);display:flex;align-items:center;gap:12px;
  padding:0 24px;border-bottom:1px solid var(--b1);background:var(--hdr-bg);
  backdrop-filter:blur(12px);position:sticky;top:0;z-index:15;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px;flex:1}
.hdr-title{font-family:'Inter',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.01em;color:var(--t1)}
.hdr-sub{font-size:12px;color:var(--t4);font-weight:400;margin-left:2px}
.hdr-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:var(--r-sm);background:transparent;
  border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;
  color:var(--t3);transition:all .15s;position:relative}
.icon-btn:hover{color:var(--t1);border-color:var(--b2);background:var(--s3)}
.clock-display{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4)}

/* View toggle */
.view-toggle{display:flex;background:var(--s3);border:1px solid var(--b1);
  border-radius:var(--r-sm);padding:3px;gap:2px}
.vt-btn{padding:4px 10px;border-radius:4px;font-size:12px;font-weight:500;
  color:var(--t3);transition:all .15s;display:flex;align-items:center;gap:5px}
.vt-btn.active{background:var(--s1);color:var(--t1);box-shadow:var(--shadow-sm)}

.btn-primary{display:flex;align-items:center;gap:6px;background:var(--purple);color:#fff;
  padding:7px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;
  box-shadow:0 1px 2px rgba(124,58,237,.2),0 4px 12px rgba(124,58,237,.15);transition:all .2s}
.btn-primary:hover{background:#6D28D9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,58,237,.3)}
.theme-btn{width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--b1);
  display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s}
.theme-btn:hover{background:var(--s3);color:var(--t1)}

/* ━━━ TOOLBAR ━━━ */
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;
  border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--s1);overflow-x:auto}
.toolbar::-webkit-scrollbar{height:0}
.filter-tabs{display:flex;gap:4px}
.ftab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;
  color:var(--t3);cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid transparent}
.ftab:hover{color:var(--t1);background:var(--s3)}
.ftab.active{color:var(--purple);background:var(--purple-d);border-color:var(--purple-g)}
.toolbar-sep{width:1px;height:20px;background:var(--b1);flex-shrink:0;margin:0 4px}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--s3);
  border:1px solid var(--b1);border-radius:var(--r-sm);padding:6px 12px;
  min-width:180px;transition:border-color .15s}
.search-bar:focus-within{border-color:var(--purple)}
.search-bar input{font-size:12px;color:var(--t1)}
.search-bar input::placeholder{color:var(--t4)}
.autosave-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t4);
  margin-left:auto;white-space:nowrap;font-family:'JetBrains Mono',monospace;flex-shrink:0;
  transition:color .3s}
.autosave-badge.saving{color:var(--amber)}
.autosave-badge.saved{color:var(--green)}
.auto-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ━━━ KANBAN LAYOUT ━━━ */
.kanban-wrapper{flex:1;overflow-x:auto;overflow-y:hidden;padding:20px 24px 0;
  display:flex;flex-direction:column}
.kanban-wrapper::-webkit-scrollbar{height:4px;background:transparent}
.kanban-wrapper::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.kanban-board{display:flex;gap:16px;height:100%;min-width:max-content;
  padding-bottom:20px;align-items:flex-start}

/* ━━━ COLUMN ━━━ */
.kanban-col{width:284px;flex-shrink:0;display:flex;flex-direction:column;
  max-height:calc(100vh - var(--hdr-h) - 100px);background:var(--s3);
  border-radius:var(--r);border:2px solid transparent;transition:border-color .2s,background .2s}
.kanban-col.drop-active{border-color:var(--purple);background:var(--purple-g)}
[data-theme="dark"] .kanban-col.drop-active{background:rgba(124,58,237,.1)}

.col-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;flex-shrink:0}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-name{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.02em;text-transform:uppercase}
.col-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--t4);background:var(--s4);border:1px solid var(--b1);
  padding:1px 7px;border-radius:10px}
.col-add{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;color:var(--t4);transition:all .15s;flex-shrink:0}
.col-add:hover{background:var(--b1);color:var(--t2)}

.col-inner{flex:1;overflow-y:auto;padding:4px 10px 10px;
  display:flex;flex-direction:column;gap:8px;min-height:60px}
.col-inner::-webkit-scrollbar{width:3px}
.col-inner::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.col-empty{display:flex;align-items:center;justify-content:center;
  padding:24px 16px;color:var(--t4);font-size:12px;text-align:center;
  border:1.5px dashed var(--b2);border-radius:8px;
  flex-direction:column;gap:8px}
.col-empty-icon{width:32px;height:32px;border-radius:8px;background:var(--s4);
  display:flex;align-items:center;justify-content:center;color:var(--t4)}

.drag-placeholder{height:80px;border:2px dashed var(--purple);border-radius:8px;
  background:var(--purple-g);opacity:.7;flex-shrink:0;border-collapse:separate}

/* ━━━ TASK CARD ━━━ */
.task-card{background:var(--s1);border:1px solid var(--b1);border-radius:8px;
  padding:13px 14px;cursor:pointer;transition:all .2s;position:relative;
  box-shadow:var(--shadow-sm);user-select:none}
.task-card:hover{box-shadow:var(--shadow-md);border-color:var(--b2);transform:translateY(-1px)}
.task-card.dragging{opacity:.4;transform:scale(.98);box-shadow:0 8px 32px rgba(124,58,237,.25)}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-priority{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.cp-urgent{background:var(--red-d);color:var(--red)}
.cp-high{background:var(--orange-d);color:var(--orange)}
.cp-medium{background:var(--purple-d);color:var(--purple)}
.cp-low{background:var(--green-d);color:var(--green)}

.card-due{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);
  display:flex;align-items:center;gap:3px}
.card-due.overdue{color:var(--red)}

.card-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.45;
  margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-title.done-text{text-decoration:line-through;color:var(--t4)}

.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;
  background:var(--s3);color:var(--t3);border:1px solid var(--b1)}

.card-progress{margin-bottom:9px}
.prog-bar{height:3px;background:var(--s4);border-radius:2px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:100%;border-radius:2px;background:var(--grad-main);transition:width .4s ease}
.prog-pct{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t4)}

.card-footer{display:flex;align-items:center;justify-content:space-between}
.avatars{display:flex}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;
  border:1.5px solid var(--s1);flex-shrink:0}
.av+.av{margin-left:-6px}
.card-project{font-size:10px;color:var(--t4);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}

/* Done column card overlay */
.col-done .task-card{opacity:.72}
.col-done .task-card:hover{opacity:1}

/* ━━━ DRAWER OVERLAY ━━━ */
.drawer-overlay{position:fixed;inset:0;z-index:40;background:rgba(15,23,42,.35);
  backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}

/* ━━━ TASK DRAWER ━━━ */
.task-drawer{position:fixed;top:0;right:0;width:var(--drawer-w);height:100vh;
  background:var(--s1);border-left:1px solid var(--b1);z-index:50;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);
  box-shadow:-8px 0 32px rgba(15,23,42,.08)}
.task-drawer.open{transform:translateX(0)}

.drawer-hdr{display:flex;align-items:flex-start;gap:12px;padding:18px 20px 14px;
  border-bottom:1px solid var(--b1);flex-shrink:0}
.drawer-title-input{flex:1;font-size:16px;font-weight:700;color:var(--t1);
  background:transparent;padding:2px 0;border-bottom:2px solid transparent;
  transition:border-color .2s;min-width:0}
.drawer-title-input:focus{border-bottom-color:var(--purple)}
.drawer-close{width:30px;height:30px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  color:var(--t4);transition:all .15s;flex-shrink:0}
.drawer-close:hover{background:var(--s3);color:var(--t1)}

.drawer-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:12px 20px;border-bottom:1px solid var(--b1);flex-shrink:0}
.dmeta-row{display:flex;flex-direction:column;gap:3px}
.dmeta-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t4)}
.dmeta-val{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px}
.dmeta-select{font-size:12px;color:var(--t2);background:var(--s3);
  border:1px solid var(--b1);border-radius:6px;padding:4px 8px;
  cursor:pointer;width:100%;font-family:inherit}
.dmeta-select:focus{border-color:var(--purple)}

/* Drawer tabs */
.drawer-tabs{display:flex;gap:0;border-bottom:1px solid var(--b1);flex-shrink:0;padding:0 20px}
.dtab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--t3);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .15s;white-space:nowrap}
.dtab:hover{color:var(--t1)}
.dtab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}

.drawer-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.drawer-body::-webkit-scrollbar{width:3px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.dtab-content{padding:18px 20px;display:none;flex-direction:column;gap:14px}
.dtab-content.active{display:flex}

/* Markdown editor */
.md-toolbar{display:flex;align-items:center;gap:2px;padding:6px 8px;
  background:var(--s3);border:1px solid var(--b1);border-bottom:none;border-radius:var(--r-sm) var(--r-sm) 0 0}
.md-btn{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;color:var(--t3);font-size:12px;font-weight:700;
  transition:all .15s;cursor:pointer}
.md-btn:hover{background:var(--b1);color:var(--t1)}
.md-sep{width:1px;height:16px;background:var(--b2);margin:0 3px}
.md-editor{flex:1;min-height:180px;padding:12px 14px;background:var(--s1);
  border:1px solid var(--b1);border-radius:0 0 var(--r-sm) var(--r-sm);
  font-family:'Inter',sans-serif;font-size:13px;color:var(--t1);line-height:1.7;
  resize:vertical}
.md-editor:focus{border-color:var(--purple);outline:none}
.autosave-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t4);
  font-family:'JetBrains Mono',monospace;height:22px}
.autosave-dot{width:6px;height:6px;border-radius:50%;background:var(--t4);transition:background .3s}
.autosave-row.saving .autosave-dot{background:var(--amber);animation:pulse-dot 1s infinite}
.autosave-row.saved .autosave-dot{background:var(--green)}
.autosave-row.saving{color:var(--amber)}
.autosave-row.saved{color:var(--green)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* Attachments */
.attach-drop{border:2px dashed var(--b2);border-radius:var(--r);padding:24px;
  text-align:center;color:var(--t4);transition:all .2s;cursor:pointer}
.attach-drop:hover{border-color:var(--purple);background:var(--purple-g);color:var(--purple)}
.attach-icon{width:36px;height:36px;border-radius:8px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;color:var(--t4);margin:0 auto 8px}
.attach-list{display:flex;flex-direction:column;gap:6px}
.attach-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--s3);border:1px solid var(--b1);border-radius:var(--r-sm)}
.attach-name{flex:1;font-size:12px;font-weight:500;color:var(--t1)}
.attach-size{font-size:11px;color:var(--t4);font-family:'JetBrains Mono',monospace}
.attach-rm{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;color:var(--t4);transition:all .15s}
.attach-rm:hover{background:var(--red-d);color:var(--red)}

/* Comments */
.comment-list{display:flex;flex-direction:column;gap:12px}
.comment{display:flex;gap:10px}
.comment-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.comment-body{flex:1;background:var(--s3);border:1px solid var(--b1);
  border-radius:0 var(--r-sm) var(--r-sm) var(--r-sm);padding:10px 12px}
.comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.comment-name{font-size:12px;font-weight:600;color:var(--t1)}
.comment-time{font-size:10px;color:var(--t4);font-family:'JetBrains Mono',monospace}
.comment-text{font-size:13px;color:var(--t2);line-height:1.55}
.comment-text .mention{color:var(--purple);font-weight:600;background:var(--purple-d);
  padding:1px 4px;border-radius:3px}
.comment-input-wrap{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.comment-input{padding:10px 12px;background:var(--s3);border:1px solid var(--b1);
  border-radius:var(--r-sm);font-size:13px;color:var(--t1);line-height:1.5;
  resize:none;min-height:72px;transition:border-color .15s;font-family:inherit}
.comment-input:focus{border-color:var(--purple);outline:none}
.comment-actions{display:flex;align-items:center;gap:8px}
.comment-send{display:flex;align-items:center;gap:6px;background:var(--purple);color:#fff;
  padding:6px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:600;transition:all .15s}
.comment-send:hover{background:#6D28D9}
.mention-hint{font-size:11px;color:var(--t4);margin-left:auto}

/* Mention dropdown */
.mention-drop{position:absolute;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r-sm);box-shadow:var(--shadow-md);z-index:100;
  min-width:160px;overflow:hidden;display:none}
.mention-drop.open{display:block}
.mention-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;
  cursor:pointer;transition:background .1s}
.mention-opt:hover{background:var(--s3)}
.mention-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.mention-name{font-size:12px;font-weight:500;color:var(--t1)}

/* Audit log */
.audit-list{display:flex;flex-direction:column;gap:0}
.audit-item{display:flex;gap:12px;padding:10px 0;position:relative}
.audit-item::after{content:'';position:absolute;left:10px;top:36px;bottom:0;
  width:1px;background:var(--b1)}
.audit-item:last-child::after{display:none}
.audit-icon{width:22px;height:22px;border-radius:50%;background:var(--s3);border:1px solid var(--b1);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t3);z-index:1}
.audit-text{flex:1}
.audit-action{font-size:12px;color:var(--t1);font-weight:500}
.audit-who{font-size:11px;color:var(--t3);margin-top:1px}
.audit-time{font-size:10px;color:var(--t4);font-family:'JetBrains Mono',monospace;margin-top:1px}

/* ━━━ AUTOMATION PANEL ━━━ */
.auto-overlay{position:fixed;inset:0;z-index:60;background:rgba(15,23,42,.35);
  display:none;align-items:flex-start;justify-content:center;padding-top:10vh}
.auto-overlay.open{display:flex;animation:fadeInBg .18s both}
.auto-panel{width:520px;max-width:calc(100vw - 40px);background:var(--s1);
  border:1px solid var(--b1);border-radius:14px;overflow:hidden;
  animation:slideUp .25s cubic-bezier(.16,1,.3,1) both;
  box-shadow:0 8px 32px rgba(15,23,42,.12),0 32px 64px rgba(15,23,42,.08)}
.auto-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--b1)}
.auto-hdr-title{font-size:15px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.auto-list{padding:12px 20px;display:flex;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto}
.auto-rule{display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--s3);border:1px solid var(--b1);border-radius:var(--r-sm)}
.auto-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.auto-rule-text{flex:1}
.auto-if{font-size:11px;color:var(--t4);font-weight:500;margin-bottom:2px}
.auto-then{font-size:12px;color:var(--t1);font-weight:600}
.auto-toggle{width:36px;height:20px;border-radius:10px;background:var(--purple);
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.auto-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;
  background:#fff;top:3px;right:3px;transition:right .2s}
.auto-toggle.off{background:var(--b2)}
.auto-toggle.off::after{right:19px}
.auto-footer{padding:16px 20px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px}
.btn-ghost{padding:7px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;
  color:var(--t2);border:1px solid var(--b1);transition:all .15s}
.btn-ghost:hover{background:var(--s3);border-color:var(--b2)}

/* ━━━ ANIMATIONS ━━━ */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(-12px) scale(.97)}to{opacity:1;transform:none}}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}

/* ━━━ RESPONSIVE ━━━ */
@media(max-width:900px){
  .sidebar{position:fixed;left:-100%;transition:left .3s;z-index:50}
  .sidebar.mobile-open{left:0}
  :root{--sb-w:250px}
  .task-drawer{width:100%;max-width:100%}
}
@media(max-width:640px){
  .kanban-col{width:260px}
  .hdr{padding:0 16px}
  .toolbar{padding:10px 16px}
  .kanban-wrapper{padding:14px 16px 0}
}
</style>
</head>

<!-- ━━━ MAIN ━━━ -->
<div class="main">

      <div class="view-toggle">

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="16" rx="1"/></svg>看板
        </button>
        <button class="vt-btn" id="vt-list" onclick="setView('list')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>列表
        </button>
      </div>
      <button class="icon-btn" onclick="openAutoPanel()" title="自動化規則">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </button>
      <button class="theme-btn" id="themeBtn" title="切換主題">
        <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
      </button>
      <button class="btn-primary" onclick="openAddTask()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增任務
      </button>

  <div class="toolbar">

<!-- ━━━ DRAWER OVERLAY ━━━ -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ━━━ TASK DRAWER ━━━ -->
<div class="task-drawer" id="taskDrawer">
  <div class="drawer-hdr">
    <input class="drawer-title-input" id="drawerTitle" placeholder="任務標題..."
      oninput="triggerAutoSave()">
    <button class="drawer-close" onclick="closeDrawer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="drawer-meta">
    <div class="dmeta-row">
      <div class="dmeta-label">狀態</div>
      <select class="dmeta-select" id="drawerStatus" onchange="updateTaskStatus()">
        <option value="todo">待辦</option>
        <option value="doing">執行中</option>
        <option value="testing">測試中</option>
        <option value="done">已完成</option>
      </select>
    </div>
    <div class="dmeta-row">
      <div class="dmeta-label">優先級</div>
      <select class="dmeta-select" id="drawerPriority" onchange="triggerAutoSave()">
        <option value="urgent">🔴 緊急</option>
        <option value="high">🟠 高</option>
        <option value="medium">🟣 中</option>
        <option value="low">🟢 低</option>
      </select>
    </div>
    <div class="dmeta-row">
      <div class="dmeta-label">截止日</div>
      <input class="dmeta-select" type="date" id="drawerDue" oninput="triggerAutoSave()">
    </div>
    <div class="dmeta-row">
      <div class="dmeta-label">進度</div>
      <div class="dmeta-val" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;align-items:center;gap:8px;width:100%">
          <input type="range" id="drawerProgress" min="0" max="100" style="flex:1"
            oninput="updateDrawerProgress(this.value)">
          <span id="drawerProgressVal" style="font-size:11px;color:var(--t4);font-family:'JetBrains Mono',monospace;width:32px">0%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="drawer-tabs">
    <button class="dtab active" data-dtab="desc" onclick="switchDTab(this)">描述</button>
    <button class="dtab" data-dtab="attach" onclick="switchDTab(this)">附件</button>
    <button class="dtab" data-dtab="comments" onclick="switchDTab(this)">留言板</button>
    <button class="dtab" data-dtab="log" onclick="switchDTab(this)">操作紀錄</button>
  </div>

  <div class="drawer-body">
    <!-- TAB: 描述 -->
    <div class="dtab-content active" id="dtab-desc">
      <div>
        <div class="md-toolbar">
          <button class="md-btn" onclick="mdInsert('**','**')" title="粗體"><b>B</b></button>
          <button class="md-btn" onclick="mdInsert('*','*')" title="斜體"><i>I</i></button>
          <button class="md-btn" onclick="mdInsert('~~','~~')" title="刪除線"><s>S</s></button>
          <div class="md-sep"></div>
          <button class="md-btn" onclick="mdInsert('`','`')" title="行內代碼" style="font-family:'JetBrains Mono',monospace;font-size:11px">``</button>
          <button class="md-btn" onclick="mdInsertLine('## ')" title="標題" style="font-weight:700;font-size:11px">H</button>
          <button class="md-btn" onclick="mdInsertLine('- ')" title="列表">≡</button>
          <button class="md-btn" onclick="mdInsertLine('- [ ] ')" title="待辦清單">☑</button>
        </div>
        <textarea class="md-editor" id="mdEditor" placeholder="在這裡撰寫任務描述... 支援 Markdown 格式"
          oninput="triggerAutoSave()"></textarea>
      </div>
      <div class="autosave-row" id="autoSaveRow">
        <div class="autosave-dot"></div>
        <span id="autoSaveText">等待輸入</span>
      </div>
    </div>

    <!-- TAB: 附件 -->
    <div class="dtab-content" id="dtab-attach">
      <div class="attach-drop" id="attachDrop" onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="handleFileDrop(event)">
        <div class="attach-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div style="font-size:13px;color:var(--t3);margin-bottom:4px">拖曳檔案或點擊上傳</div>
        <div style="font-size:11px;color:var(--t4)">支援 PDF, PNG, JPG, ZIP, DOCX</div>
      </div>
      <input type="file" id="fileInput" style="display:none" multiple onchange="handleFileSelect(event)">
      <div class="attach-list" id="attachList"></div>
    </div>

    <!-- TAB: 留言板 -->
    <div class="dtab-content" id="dtab-comments">
      <div class="comment-list" id="commentList"></div>
      <div style="position:relative">
        <textarea class="comment-input" id="commentInput"
          placeholder="留言... 輸入 @ 可以 @成員" rows="3"
          onkeydown="handleCommentKey(event)" oninput="handleMentionInput(event)"></textarea>
        <div class="mention-drop" id="mentionDrop"></div>
      </div>
      <div class="comment-actions">
        <button class="comment-send" onclick="sendComment()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>發送
        </button>
        <span class="mention-hint">輸入 @ 提及成員</span>
      </div>
    </div>

    <!-- TAB: 操作紀錄 -->
    <div class="dtab-content" id="dtab-log">
      <div class="audit-list" id="auditList"></div>
    </div>
  </div>
</div>

<!-- ━━━ AUTOMATION PANEL ━━━ -->
<div class="auto-overlay" id="autoOverlay" onclick="if(event.target===this)closeAutoPanel()">
  <div class="auto-panel">
    <div class="auto-hdr">
      <div class="auto-hdr-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>

      </div>
      <button class="drawer-close" onclick="closeAutoPanel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="auto-list">
      <div class="auto-rule">
        <div class="auto-icon" style="background:var(--green-d);color:var(--green)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="auto-rule-text">
          <div class="auto-if">觸發條件：狀態改為「完成」</div>
          <div class="auto-then">→ 自動更新專案進度條，觸發慶祝動畫</div>
        </div>
        <div class="auto-toggle" title="開啟中" onclick="this.classList.toggle('off')"></div>
      </div>
      <div class="auto-rule">
        <div class="auto-icon" style="background:var(--red-d);color:var(--red)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="auto-rule-text">
          <div class="auto-if">觸發條件：截止日期已超過</div>
          <div class="auto-then">→ 自動將優先級設為「緊急」並發送通知</div>
        </div>
        <div class="auto-toggle" title="開啟中" onclick="this.classList.toggle('off')"></div>
      </div>
      <div class="auto-rule">
        <div class="auto-icon" style="background:var(--purple-d);color:var(--purple)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        </div>
        <div class="auto-rule-text">
          <div class="auto-if">觸發條件：新增任務到「待辦」欄</div>
          <div class="auto-then">→ 自動指派給當前登入者，新增至番茄鐘清單</div>
        </div>
        <div class="auto-toggle off" title="關閉中" onclick="this.classList.toggle('off')"></div>
      </div>
      <div class="auto-rule">
        <div class="auto-icon" style="background:var(--amber-d);color:var(--amber)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="auto-rule-text">
          <div class="auto-if">觸發條件：進度達到 100%</div>

function getFilteredTasks(colId) {

    if(currentFilter === 'urgent' && t.priority !== 'urgent') return false;
    if(['todo','doing','testing','done'].includes(currentFilter) && currentFilter !== 'all' && t.col !== currentFilter) return false;
    if(searchQuery && !t.title.toLowerCase().includes(searchQuery.toLowerCase()) &&
       !t.tags.some(g=>g.toLowerCase().includes(searchQuery.toLowerCase()))) return false;
    return true;
  });
}

function renderCard(task) {
  const pCls = {urgent:'cp-urgent',high:'cp-high',medium:'cp-medium',low:'cp-low'};
  const pLabel = {urgent:'緊急',high:'高',medium:'中',low:'低'};
  const today = new Date(); today.setHours(0,0,0,0);
  const dueDate = task.due ? new Date(task.due) : null;
  const isOverdue = dueDate && dueDate < today && task.col !== 'done';
  const dueStr = dueDate ? `${dueDate.getMonth()+1}/${dueDate.getDate()}` : '';

  const avHtml = task.assignees.slice(0,3).map(uid => {
    const m = MEMBERS[uid];
    return m ? `<div class="av" style="background:${m.color}" title="${m.name}">${m.initial}</div>` : '';
  }).join('');

  const tagsHtml = task.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  const doneCls = task.col === 'done' ? 'done-text' : '';

  const div = document.createElement('div');
  div.className = 'task-card';
  div.dataset.id = task.id;
  div.setAttribute('draggable', 'true');
  div.innerHTML = `
    <div class="card-top">
      <span class="card-priority ${pCls[task.priority]}">${pLabel[task.priority]}</span>
      ${dueStr ? `<span class="card-due ${isOverdue?'overdue':''}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dueStr}</span>` : ''}
    </div>
    <div class="card-title ${doneCls}">${task.title}</div>
    ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
    <div class="card-progress">
      <div class="prog-bar"><div class="prog-fill" style="width:${task.progress}%"></div></div>
      <span class="prog-pct">${task.progress}%</span>
    </div>
    <div class="card-footer">
      <div class="avatars">${avHtml}</div>
      <span class="card-project">${task.project||''}</span>
    </div>`;

  div.addEventListener('click', () => openDrawer(task.id));
  initDnd(div);
  return div;
}

//  DRAG AND DROP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let dragSrc = null;
let enterCounters = new WeakMap();

function initDnd(cardEl) {
  cardEl.addEventListener('dragstart', e => {
    dragSrc = cardEl;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', cardEl.dataset.id);
    requestAnimationFrame(() => cardEl.classList.add('dragging'));
    // Create placeholder
    const ph = document.createElement('div');
    ph.className = 'drag-placeholder';
    ph.id = 'dragPlaceholder';
  });

  cardEl.addEventListener('dragend', () => {
    cardEl.classList.remove('dragging');
    document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drop-active'));
    const ph = document.getElementById('dragPlaceholder');
    if(ph) ph.remove();
    dragSrc = null;
  });
}

function initDropZone(colEl) {
  const inner = colEl.querySelector('.col-inner');
  let counter = 0;

  colEl.addEventListener('dragenter', e => {
    e.preventDefault();
    counter++;
    colEl.classList.add('drop-active');
  });

  colEl.addEventListener('dragleave', () => {
    counter--;
    if(counter <= 0) { counter = 0; colEl.classList.remove('drop-active'); }
  });

  colEl.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if(!dragSrc) return;

    let ph = document.getElementById('dragPlaceholder');
    if(!ph) { ph = document.createElement('div'); ph.className='drag-placeholder'; ph.id='dragPlaceholder'; }

    const afterEl = getDragAfter(inner, e.clientY);
    if(afterEl == null) inner.appendChild(ph);
    else inner.insertBefore(ph, afterEl);
  });

  colEl.addEventListener('drop', e => {
    e.preventDefault();
    counter = 0;
    colEl.classList.remove('drop-active');
    if(!dragSrc) return;

    const ph = document.getElementById('dragPlaceholder');
    if(ph && ph.parentNode === inner) {
      inner.insertBefore(dragSrc, ph);
      ph.remove();
    } else {
      inner.appendChild(dragSrc);
    }

    const taskId = dragSrc.dataset.id;
    const newCol = colEl.dataset.col;
    updateTaskColumn(taskId, newCol);

    // Update card visual for done column
    const titleEl = dragSrc.querySelector('.card-title');
    if(newCol === 'done' && titleEl) titleEl.classList.add('done-text');
    else if(titleEl) titleEl.classList.remove('done-text');

    // Remove empty placeholder if any
    const empties = inner.querySelectorAll('.col-empty');
    empties.forEach(el => el.remove());
  });
}

function getDragAfter(container, y) {
  const els = [...container.querySelectorAll('.task-card:not(.dragging)')];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closest.offset) return {offset, element: child};
    return closest;
  }, {offset: Number.NEGATIVE_INFINITY}).element;
}

    task.log.unshift({action:`狀態更新為「${COL_CFG[newCol].label}」`,user:'u1',time:nowStr()});

    saveTasks();

function saveCurrentTask() {

  badge.className = 'autosave-badge saved';
  txt.textContent = msg || '✓ 已同步';
  setTimeout(() => { badge.className = 'autosave-badge'; txt.textContent = '已同步'; }, 3000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MARKDOWN EDITOR HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function mdInsert(before, after) {
  const el = document.getElementById('mdEditor');
  const s = el.selectionStart, e = el.selectionEnd;
  const sel = el.value.slice(s, e) || '文字';
  el.value = el.value.slice(0,s) + before + sel + after + el.value.slice(e);
  el.setSelectionRange(s + before.length, s + before.length + sel.length);
  el.focus(); triggerAutoSave();
}
function mdInsertLine(prefix) {
  const el = document.getElementById('mdEditor');
  const s = el.selectionStart;
  const lineStart = el.value.lastIndexOf('\n', s-1) + 1;
  el.value = el.value.slice(0, lineStart) + prefix + el.value.slice(lineStart);
  el.focus(); triggerAutoSave();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  COMMENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderComments(comments) {
  const list = document.getElementById('commentList');
  if(!comments.length) {
    list.innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--t4);font-size:12px">尚無留言，成為第一個留言的人！</div>';
    return;
  }
  list.innerHTML = comments.map(c => {
    const m = MEMBERS[c.user];
    const text = (c.text||'').replace(/@(\S+)/g, '<span class="mention">@$1</span>');
    return `<div class="comment">
      <div class="comment-av" style="background:${m?m.color:'#7C3AED'}">${m?m.initial:'?'}</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-name">${m?m.name:'匿名'}</span>
          <span class="comment-time">${c.time}</span>
        </div>
        <div class="comment-text">${text}</div>
      </div>
    </div>`;
  }).join('');
}

function sendComment() {
  if(!currentTaskId) return;
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if(!text) return;
  const task = getTask(currentTaskId);
  const comment = {user:'u1', text, time:'方才', id:'c'+Date.now()};
  task.comments.push(comment);
  task.log.unshift({action:'新增留言',user:'u1',time:nowStr()});
  renderComments(task.comments);
  renderAuditLog(task.log);
  input.value = '';
  saveTasks();
  document.getElementById('mentionDrop').classList.remove('open');
}

function handleCommentKey(e) {
  if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendComment(); }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  @MENTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function handleMentionInput(e) {
  const val = e.target.value;
  const pos = e.target.selectionStart;
  const lastAt = val.lastIndexOf('@', pos);
  const drop = document.getElementById('mentionDrop');

  if(lastAt >= 0 && pos > lastAt) {
    const query = val.slice(lastAt + 1, pos).toLowerCase();
    const matches = MEMBER_LIST.filter(m => m.name.includes(query) || m.id.includes(query));
    if(matches.length > 0 && !val.slice(lastAt+1).includes(' ')) {
      drop.innerHTML = matches.map(m =>
        `<div class="mention-opt" onmousedown="insertMention('${m.name}')">
          <div class="mention-av" style="background:${m.color}">${m.initial}</div>
          <span class="mention-name">${m.name}</span>
        </div>`
      ).join('');
      drop.classList.add('open');
      return;
    }
  }
  drop.classList.remove('open');
}

function insertMention(name) {
  const input = document.getElementById('commentInput');
  const val = input.value;
  const pos = input.selectionStart;
  const lastAt = val.lastIndexOf('@', pos);
  input.value = val.slice(0, lastAt) + '@' + name + ' ' + val.slice(pos);
  input.focus();
  document.getElementById('mentionDrop').classList.remove('open');
}

document.addEventListener('click', e => {
  if(!e.target.closest('#mentionDrop') && !e.target.closest('#commentInput')) {
    document.getElementById('mentionDrop').classList.remove('open');
  }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ATTACHMENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderAttachments(attachments) {
  const list = document.getElementById('attachList');
  if(!attachments.length) { list.innerHTML = ''; return; }
  list.innerHTML = attachments.map((a,i) => `
    <div class="attach-item">
      <div class="attach-icon" style="width:28px;height:28px;border-radius:6px;background:var(--purple-d);display:flex;align-items:center;justify-content:center;color:var(--purple);flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
      </div>
      <span class="attach-name">${a.name}</span>
      <span class="attach-size">${a.size}</span>
      <button class="attach-rm" onclick="removeAttachment(${i})" title="移除">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');
}

function handleFileSelect(e) {
  const files = Array.from(e.target.files);
  addAttachments(files);
}
function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('attachDrop').classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  addAttachments(files);
}
function addAttachments(files) {
  if(!currentTaskId) return;
  const task = getTask(currentTaskId);
  files.forEach(f => {
    const size = f.size < 1024 ? f.size+'B' : f.size < 1048576 ? (f.size/1024).toFixed(1)+'KB' : (f.size/1048576).toFixed(1)+'MB';
    task.attachments = task.attachments || [];
    task.attachments.push({name:f.name, size, time: nowStr()});
    task.log.unshift({action:`上傳附件「${f.name}」`,user:'u1',time:nowStr()});
  });
  renderAttachments(task.attachments);
  renderAuditLog(task.log);
  saveTasks();
}
function removeAttachment(idx) {
  if(!currentTaskId) return;
  const task = getTask(currentTaskId);
  task.attachments.splice(idx, 1);
  renderAttachments(task.attachments);
  saveTasks();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AUDIT LOG
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ACTION_ICONS = {
  '建立': '<path d="M12 5v14M5 12h14"/>',
  '狀態': '<path d="M9 11l3 3L22 4"/>',
  '指派': '<circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/>',
  '留言': '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  '上傳': '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  '進度': '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
};

function renderAuditLog(log) {
  const list = document.getElementById('auditList');
  if(!log.length) { list.innerHTML = '<div style="text-align:center;padding:16px;color:var(--t4);font-size:12px">尚無操作紀錄</div>'; return; }
  list.innerHTML = log.map(entry => {
    const m = MEMBERS[entry.user];
    const iconKey = Object.keys(ACTION_ICONS).find(k => entry.action.startsWith(k)) || '進度';
    const iconPath = ACTION_ICONS[iconKey];
    return `<div class="audit-item">
      <div class="audit-icon">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconPath}</svg>
      </div>
      <div class="audit-text">
        <div class="audit-action">${entry.action}</div>
        <div class="audit-who">由 ${m?m.name:'系統'}</div>
        <div class="audit-time">${entry.time}</div>
      </div>
    </div>`;
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ADD TASK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openAddTask(col = 'todo') {
  const id = 't' + Date.now();
  const task = {
    id, col, title: '新增任務', priority: 'medium', tags: [],
    due: '', progress: 0, assignees: ['u1'], project: '電商平台',
    desc: '', comments: [], attachments: [],
    log: [{action:'建立任務', user:'u1', time: nowStr()}]
  };
  TASKS.push(task);
  saveTasks();
  renderBoard();
  updateTaskCountLabel();
  openDrawer(id);
  setTimeout(() => { const inp = document.getElementById('drawerTitle'); if(inp){inp.select();} }, 100);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  VIEW TOGGLE (kanban / list)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setView(v) {
  document.getElementById('vt-kanban').classList.toggle('active', v==='kanban');
  document.getElementById('vt-list').classList.toggle('active', v==='list');
  if(v === 'list') renderListView();
  else renderBoard();
}

function renderListView() {
  const board = document.getElementById('kanbanBoard');
  board.style.cssText = 'display:flex;flex-direction:column;gap:0;min-width:0;width:100%;height:auto';
  board.innerHTML = `
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);width:100%">
      <div style="display:grid;grid-template-columns:1fr 100px 100px 80px 120px 100px;gap:0;padding:10px 16px;border-bottom:1px solid var(--b1);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t4)">
        <div>任務名稱</div><div>優先級</div><div>狀態</div><div>進度</div><div>截止日</div><div>指派人</div>
      </div>
      ${TASKS.filter(t=>{
        if(searchQuery&&!t.title.toLowerCase().includes(searchQuery.toLowerCase()))return false;
        if(currentFilter==='urgent'&&t.priority!=='urgent')return false;
        if(['todo','doing','testing','done'].includes(currentFilter)&&currentFilter!=='all'&&t.col!==currentFilter)return false;
        return true;
      }).map(t => {
        const m = MEMBERS[t.assignees[0]];
        const pCls={urgent:'cp-urgent',high:'cp-high',medium:'cp-medium',low:'cp-low'};
        const pLbl={urgent:'緊急',high:'高',medium:'中',low:'低'};
        const sLbl = COL_CFG[t.col]?.label||t.col;
        const sColor = COL_CFG[t.col]?.color||'#94A3B8';
        return `<div onclick="openDrawer('${t.id}')" style="display:grid;grid-template-columns:1fr 100px 100px 80px 120px 100px;gap:0;padding:12px 16px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background=''">
          <div style="font-size:13px;font-weight:500;color:var(--t1)">${t.title}</div>
          <div><span class="card-priority ${pCls[t.priority]}" style="font-size:10px">${pLbl[t.priority]}</span></div>
          <div><span style="font-size:11px;font-weight:500;color:${sColor}">${sLbl}</span></div>
          <div style="font-size:12px;color:var(--t3);font-family:'JetBrains Mono',monospace">${t.progress}%</div>
          <div style="font-size:11px;color:var(--t4);font-family:'JetBrains Mono',monospace">${t.due||'—'}</div>
          <div>${m?`<div class="av" style="background:${m.color};width:22px;height:22px;font-size:10px">${m.initial}</div>`:''}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AUTOMATION PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openAutoPanel() { document.getElementById('autoOverlay').classList.add('open'); }
function closeAutoPanel() { document.getElementById('autoOverlay').classList.remove('open'); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
renderBoard();
updateTaskCountLabel();
</script>
