<title>PMSuite — 番茄鐘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Plus+Jakarta+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{cursor:pointer;border:none;background:none;font:inherit}
input,select{font:inherit;border:none;outline:none;background:none}
svg{display:block;flex-shrink:0}

:root {
  --bg:#08080f; --s1:#0e0d14; --s2:#141320; --s3:#1c1a2a; --s4:#252336;
  --b1:#1e1c2e; --b2:#2a2840; --b3:#3a3852;
  --t1:#f0edfb; --t2:#9490b0; --t3:#58547a; --t4:#35324a;
  --purple:#c084fc; --purple-d:rgba(192,132,252,.13); --purple-g:rgba(192,132,252,.06);
  --cyan:#38bdf8;   --cyan-d:rgba(56,189,248,.13);
  --teal:#2dd4bf;   --teal-d:rgba(45,212,191,.13);
  --green:#4ade80;  --green-d:rgba(74,222,128,.13);
  --amber:#fbbf24;  --amber-d:rgba(251,191,36,.13);
  --orange:#fb923c; --orange-d:rgba(251,146,60,.13);
  --pink:#f472b6;   --pink-d:rgba(244,114,182,.13);
  --red:#f87171;    --red-d:rgba(248,113,113,.13);
  --grad-main:linear-gradient(135deg,#c084fc 0%,#38bdf8 100%);
  --grad-fire:linear-gradient(135deg,#f472b6 0%,#fb923c 100%);
  --grad-cool:linear-gradient(135deg,#38bdf8 0%,#2dd4bf 100%);
  --sb-w:228px; --hdr-h:58px; --r:10px; --r-sm:6px;
  --hdr-bg:rgba(8,8,15,.9); --ghost-op:.05;
  /* timer accent (changes per mode) */
  --mode-color: #f472b6;
  --mode-grad:  linear-gradient(135deg,#f472b6,#fb923c);
}
[data-theme="light"] {
  --bg:#f4f2fb; --s1:#fff; --s2:#edeaf7; --s3:#e2dff2; --s4:#d5d0ea;
  --b1:#dbd6f0; --b2:#ccc6e4; --b3:#b8b2d8;
  --t1:#18142a; --t2:#5a5475; --t3:#9088aa; --t4:#b8b0cc;
  --purple-d:rgba(192,132,252,.14); --purple-g:rgba(192,132,252,.08);
  --cyan-d:rgba(56,189,248,.14); --teal-d:rgba(45,212,191,.14);
  --green-d:rgba(74,222,128,.14); --orange-d:rgba(251,146,60,.14);
  --hdr-bg:rgba(244,242,251,.92); --ghost-op:.07;
}
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f4f2fb; --s1:#fff; --s2:#edeaf7; --s3:#e2dff2;
    --b1:#dbd6f0; --b2:#ccc6e4; --b3:#b8b2d8;
    --t1:#18142a; --t2:#5a5475; --t3:#9088aa; --t4:#b8b0cc;
    --hdr-bg:rgba(244,242,251,.92); --ghost-op:.07;
  }
}
body,aside,.hdr,.panel,.card{transition:background-color .28s,border-color .28s,color .2s}

body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);
  min-height:100vh;display:flex;overflow:hidden;font-size:14px}

/* ── SIDEBAR (identical to dashboard) ── */
.sidebar{width:var(--sb-w);min-height:100vh;background:var(--s1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;flex-shrink:0;z-index:20}
.logo{height:var(--hdr-h);display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--b1)}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--grad-main);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:#fff;
  box-shadow:0 0 18px rgba(192,132,252,.35)}
.logo-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  letter-spacing:.04em;text-transform:uppercase;color:var(--t1)}
.logo-label em{font-style:normal;background:var(--grad-main);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:1px}
.nav-sec{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--t4);padding:12px 10px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);
  color:var(--t3);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s}
.nav-item:hover{color:var(--t1);background:var(--s2)}
.nav-item.active{color:var(--t1);background:var(--purple-g);border-left:2px solid var(--purple);padding-left:10px}
.ni{color:var(--t4);flex-shrink:0;transition:color .15s}
.nav-item.active .ni{color:var(--purple)}
.nav-item:hover .ni{color:var(--t2)}
.nav-chip{margin-left:auto;font-family:'Fira Code',monospace;font-size:10px;font-weight:500;
  padding:1px 7px;border-radius:10px;background:var(--s3);color:var(--t2);border:1px solid var(--b2)}
.nav-chip.hot{background:var(--red-d);color:var(--red);border-color:transparent}
.sb-footer{padding:12px 10px;border-top:1px solid var(--b1)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s}
.user-row:hover{background:var(--s2)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--grad-main);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--t1)}
.user-role{font-size:11px;color:var(--t3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.hdr{height:var(--hdr-h);display:flex;align-items:center;gap:14px;padding:0 28px;
  border-bottom:1px solid var(--b1);background:var(--hdr-bg);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:10;flex-shrink:0}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;
  letter-spacing:.03em;color:var(--t1);flex:1}
.hdr-title span{color:var(--t3);font-weight:400;font-size:16px;margin-left:8px}
.icon-btn{width:36px;height:36px;border-radius:var(--r-sm);background:var(--s2);
  border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;
  color:var(--t3);transition:all .15s}
.icon-btn:hover{color:var(--t1);border-color:var(--b2)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:28px;display:grid;
  grid-template-columns:1fr 320px;gap:20px;align-content:start}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* ── TIMER CARD ── */
.timer-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:32px 28px;display:flex;flex-direction:column;align-items:center;gap:24px;
  animation:up .5s .05s cubic-bezier(.16,1,.3,1) both}

/* Mode tabs */
.mode-tabs{display:flex;gap:6px;background:var(--s2);padding:4px;border-radius:var(--r-sm);
  border:1px solid var(--b1)}
.mode-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:.08em;text-transform:uppercase;
  padding:7px 16px;border-radius:5px;color:var(--t3);transition:all .2s}
.mode-btn:hover{color:var(--t2)}
.mode-btn.active{background:var(--s3);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* Ring timer */
.ring-area{position:relative;display:flex;align-items:center;justify-content:center;
  width:240px;height:240px}
.ring-svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--s3);stroke-width:8}
.ring-progress{fill:none;stroke:url(#timer-grad);stroke-width:8;stroke-linecap:round;
  stroke-dasharray:659.73; /* 2*π*105 */
  stroke-dashoffset:0;
  transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .3s}
.ring-center{position:relative;z-index:1;text-align:center}
.timer-display{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:64px;
  line-height:1;letter-spacing:-.02em;color:var(--t1)}
.timer-mode-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--mode-color);margin-top:4px;font-weight:600;transition:color .3s}

/* Session dots */
.session-dots{display:flex;gap:8px;align-items:center}
.s-dot{width:10px;height:10px;border-radius:50%;background:var(--s3);
  border:1.5px solid var(--b2);transition:all .3s}
.s-dot.done{background:var(--mode-color);border-color:var(--mode-color);
  box-shadow:0 0 8px var(--mode-color)}
.s-dot.current{background:transparent;border-color:var(--mode-color);
  box-shadow:0 0 6px var(--mode-color);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 4px var(--mode-color)}50%{box-shadow:0 0 12px var(--mode-color)}}

/* Controls */
.controls{display:flex;align-items:center;gap:12px}
.ctrl-btn{width:42px;height:42px;border-radius:50%;background:var(--s2);border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;color:var(--t2);
  transition:all .2s}
.ctrl-btn:hover{background:var(--s3);color:var(--t1);border-color:var(--b3)}
.ctrl-play{width:60px;height:60px;background:var(--mode-grad);
  border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;transition:all .2s;box-shadow:0 0 20px rgba(244,114,182,.35)}
.ctrl-play:hover{transform:scale(1.08);box-shadow:0 0 30px rgba(244,114,182,.5)}

/* Task selector */
.task-selector{width:100%;background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r-sm);padding:12px 16px;
  display:flex;flex-direction:column;gap:8px}
.task-sel-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-weight:600}
.task-sel-wrap{position:relative}
.task-sel-wrap select{
  width:100%;appearance:none;cursor:pointer;
  background:transparent;color:var(--t1);font-size:13px;font-weight:500;
  padding:6px 32px 6px 0;border:none;outline:none}
.task-sel-wrap select option{background:var(--s2);color:var(--t1)}
.task-sel-wrap::after{content:'▾';position:absolute;right:0;top:50%;transform:translateY(-50%);
  color:var(--t3);pointer-events:none;font-size:12px}
.task-sel-divider{height:1px;background:var(--b1)}
.task-sel-info{display:flex;align-items:center;justify-content:space-between}
.task-sel-stat{font-size:11.5px;color:var(--t2)}
.task-sel-stat strong{font-family:'Fira Code',monospace;color:var(--t1)}

/* ── RIGHT PANEL ── */
.right-col{display:flex;flex-direction:column;gap:14px}

.panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;
  animation:up .5s cubic-bezier(.16,1,.3,1) both}
.panel:nth-child(1){animation-delay:.1s}
.panel:nth-child(2){animation-delay:.18s}
.panel:nth-child(3){animation-delay:.26s}

.panel-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--b1)}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--t1);display:flex;align-items:center;gap:8px}
.pdot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 5px currentColor}

/* Today stats */
.today-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--b1)}
.today-stat{background:var(--s1);padding:16px;text-align:center}
.today-stat-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--t1)}
.today-stat-l{font-size:10px;color:var(--t3);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}

/* History list */
.hist-list{padding:4px 0;max-height:260px;overflow-y:auto}
.hist-list::-webkit-scrollbar{width:4px}
.hist-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.hist-item{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--b1)}
.hist-item:last-child{border-bottom:none}
.hist-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0}
.hist-icon.work{background:var(--pink-d)}
.hist-icon.break{background:var(--teal-d)}
.hist-info{flex:1;min-width:0}
.hist-task{font-size:12.5px;font-weight:500;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-time{font-size:10.5px;color:var(--t3);font-family:'Fira Code',monospace;margin-top:2px}
.hist-dur{font-family:'Fira Code',monospace;font-size:11px;color:var(--t4);flex-shrink:0}

/* Completed tasks quick view */
.completed-task{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--b1)}
.completed-task:last-child{border-bottom:none}
.check-icon{width:16px;height:16px;border-radius:50%;background:var(--teal);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ct-name{font-size:12.5px;color:var(--t1);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-pts{font-family:'Fira Code',monospace;font-size:10px;color:var(--teal)}

/* ── animations ── */
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ━━━ LIQUID FILL ━━━ */
#liquid-rect{transition:y .95s cubic-bezier(.4,0,.2,1)}
#liquid-shimmer{
  animation:shimmerSlide 2.8s linear infinite;
}
@keyframes shimmerSlide{
  from{transform:translateX(-100%)}
  to  {transform:translateX(200%)}
}

/* ━━━ RING COMPLETE PULSE ━━━ */
@keyframes ringCompletePulse{
  0%  {filter:drop-shadow(0 0 0px rgba(251,191,36,0))}
  35% {filter:drop-shadow(0 0 18px rgba(251,191,36,.9)) drop-shadow(0 0 40px rgba(251,191,36,.4))}
  100%{filter:drop-shadow(0 0 0px rgba(251,191,36,0))}
}
.ring-area.complete-pulse .ring-svg{animation:ringCompletePulse .85s ease-out both}

/* ━━━ COIN BURST ━━━ */
@keyframes coinFly{
  0%  {transform:translate(0,0) scale(1.2);opacity:1}
  60% {transform:translate(var(--cx),var(--cy)) scale(1);opacity:1}
  100%{transform:translate(calc(var(--cx)*1.3),calc(var(--cy)*1.3 + 16px)) scale(.4);opacity:0}
}
.pomo-coin{
  position:fixed;z-index:600;pointer-events:none;
  font-size:22px;line-height:1;
  animation:coinFly .95s cubic-bezier(.2,.8,.6,1) both;
  filter:drop-shadow(0 0 8px rgba(251,191,36,.9));
}

/* Coin collect text */
@keyframes collectFade{
  0%  {opacity:0;transform:translate(-50%,0) scale(.7)}
  20% {opacity:1;transform:translate(-50%,-12px) scale(1)}
  80% {opacity:1;transform:translate(-50%,-36px) scale(1)}
  100%{opacity:0;transform:translate(-50%,-52px) scale(.85)}
}
.coin-text{
  position:fixed;z-index:600;pointer-events:none;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;
  color:#fbbf24;letter-spacing:.06em;
  text-shadow:0 0 16px rgba(251,191,36,.8);
  animation:collectFade 1.5s cubic-bezier(.16,1,.3,1) both;
}
</style>
</head>

      </svg>

  <div class="content">

    <!-- Timer Card -->
    <div class="timer-card">

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-btn active" data-mode="work"   data-minutes="25">🍅 25 分鐘</button>
        <button class="mode-btn"        data-mode="short"  data-minutes="5">☕ 5 分鐘</button>

      </div>

      <!-- Ring -->
      <div class="ring-area" id="ring-area">
        <svg class="ring-svg" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="timer-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop id="grad-stop-1" offset="0%" stop-color="#f472b6"/>
              <stop id="grad-stop-2" offset="100%" stop-color="#fb923c"/>
            </linearGradient>
            <!-- Liquid fill gradient: top = accent, bottom = transparent -->
            <linearGradient id="liquid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop id="liq-stop-1" offset="0%"   stop-color="#f472b6" stop-opacity="0.28"/>
              <stop id="liq-stop-2" offset="100%" stop-color="#fb923c" stop-opacity="0.10"/>
            </linearGradient>
            <!-- Shimmer overlay -->
            <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="white" stop-opacity="0"/>
              <stop offset="45%"  stop-color="white" stop-opacity="0.07"/>
              <stop offset="55%"  stop-color="white" stop-opacity="0.12"/>
              <stop offset="100%" stop-color="white" stop-opacity="0"/>
            </linearGradient>
            <!-- Clip to inner circle -->
            <clipPath id="inner-clip">
              <circle cx="120" cy="120" r="100"/>
            </clipPath>
          </defs>

          <!-- Track ring -->
          <circle class="ring-track" cx="120" cy="120" r="105"/>

          <!-- Liquid fill (clipped to inner circle, y animated by JS) -->
          <rect id="liquid-rect"
                x="20" y="220" width="200" height="200"
                fill="url(#liquid-grad)"
                clip-path="url(#inner-clip)"/>

          <!-- Wave path on top of liquid (positioned by JS) -->
          <path id="liquid-wave"
                d="M20,0 C55,-7 85,7 120,0 C155,-7 185,7 220,0 L220,10 L20,10 Z"
                fill="url(#liquid-grad)"
                clip-path="url(#inner-clip)"
                transform="translate(0,220)" opacity="0.9"/>

          <!-- Shimmer band (scrolls over liquid area) -->
          <rect id="liquid-shimmer"
                x="-40" y="20" width="80" height="200"
                fill="url(#shimmer-grad)"
                clip-path="url(#inner-clip)"/>

          <!-- Progress stroke ring (on top) -->
          <circle class="ring-progress" cx="120" cy="120" r="105" id="ring-prog"/>
        </svg>
        <div class="ring-center">
          <div class="timer-display" id="timer-display">25:00</div>
          <div class="timer-mode-label" id="mode-label">工作時間</div>
        </div>
      </div>

      <!-- Session dots -->
      <div class="session-dots" id="session-dots">
        <div class="s-dot current" data-idx="0"></div>
        <div class="s-dot" data-idx="1"></div>
        <div class="s-dot" data-idx="2"></div>
        <div class="s-dot" data-idx="3"></div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="btn-reset" title="重置">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.14"/>
          </svg>
        </button>
        <button class="ctrl-play" id="btn-play">
          <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-skip" title="跳過">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 4 15 12 5 20 5 4"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
      </div>

      <!-- Task selector -->
      <div class="task-selector">
        <div class="task-sel-label">計時任務</div>
        <div class="task-sel-wrap">
          <select id="task-select">
            <option value="">— 選擇任務（選填）—</option>
            <option value="t1" data-logged="45" data-est="120">實作 API 端點</option>
            <option value="t2" data-logged="30" data-est="90">撰寫測試案例</option>
            <option value="t3" data-logged="0"  data-est="60">優化資料庫查詢</option>
            <option value="t4" data-logged="15" data-est="45">設計通知系統架構</option>
            <option value="t5" data-logged="0"  data-est="180">更新 CI/CD 流程</option>
          </select>
        </div>
        <div class="task-sel-divider"></div>
        <div class="task-sel-info" id="task-info" style="display:none">
          <span class="task-sel-stat">已記錄：<strong id="info-logged">--</strong></span>
          <span class="task-sel-stat">預估：<strong id="info-est">--</strong></span>
          <span class="task-sel-stat">剩餘：<strong id="info-remain">--</strong></span>
        </div>
      </div>

    </div><!-- /timer-card -->

    <!-- Right column -->
    <div class="right-col">

      <!-- Today stats -->
      <div class="panel">
        <div class="panel-hdr">
          <div class="panel-title">
            <div class="pdot" style="color:var(--orange);background:var(--orange)"></div>
            今日紀錄
          </div>
        </div>
        <div class="today-stats">
          <div class="today-stat">
            <div class="today-stat-n" id="stat-pomodoros" style="color:var(--orange)">0</div>
            <div class="today-stat-l">🍅 番茄數</div>
          </div>
          <div class="today-stat">
            <div class="today-stat-n" id="stat-minutes" style="color:var(--purple)">0</div>
            <div class="today-stat-l">分鐘</div>
          </div>
          <div class="today-stat">
            <div class="today-stat-n" id="stat-rate" style="color:var(--teal)">—</div>
            <div class="today-stat-l">完成率</div>
          </div>
        </div>
      </div>

      <!-- History -->
      <div class="panel">
        <div class="panel-hdr">
          <div class="panel-title">
            <div class="pdot" style="color:var(--purple);background:var(--purple)"></div>
            計時紀錄
          </div>
          <span style="font-size:11px;color:var(--t4);font-family:'Fira Code',monospace">今日</span>
        </div>
        <div class="hist-list" id="hist-list">
          <div style="padding:24px;text-align:center;color:var(--t4);font-size:12px">
            尚無紀錄，開始你的第一個番茄鐘 🍅
          </div>
        </div>
      </div>

      <!-- Sprint Tasks -->
      <div class="panel">
        <div class="panel-hdr">
          <div class="panel-title">
            <div class="pdot" style="color:var(--teal);background:var(--teal)"></div>
            Sprint #12 任務
          </div>
        </div>
        <div>
          <div class="completed-task">
            <div class="check-icon"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#08080f" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg></div>
            <span class="ct-name">完成登入頁面設計</span>
            <span class="ct-pts">+3pt</span>
          </div>
          <div class="completed-task" style="opacity:.6">
            <div style="width:16px;height:16px;border-radius:50%;border:1.5px solid var(--b3);flex-shrink:0"></div>
            <span class="ct-name">實作 API 端點</span>
            <span style="font-family:'Fira Code',monospace;font-size:10px;color:var(--orange)">8pt</span>
          </div>
          <div class="completed-task" style="opacity:.6">
            <div style="width:16px;height:16px;border-radius:50%;border:1.5px solid var(--b3);flex-shrink:0"></div>
            <span class="ct-name">撰寫測試案例</span>
            <span style="font-family:'Fira Code',monospace;font-size:10px;color:var(--orange)">5pt</span>
          </div>
        </div>
      </div>

    </div><!-- /right-col -->
  </div><!-- /content -->
</div>

<script>
// ─── Theme ───────────────────────────────────
const root = document.documentElement;
const LS = 'pms-theme';
const sys = () => window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
function applyTheme(t) {
  root.setAttribute('data-theme', t);
  const sun = document.getElementById('icon-sun'), moon = document.getElementById('icon-moon');
  if (sun && moon) { sun.style.display = t==='dark'?'block':'none'; moon.style.display = t==='light'?'block':'none'; }
}
applyTheme(localStorage.getItem(LS) || sys());
document.getElementById('theme-toggle')?.addEventListener('click', () => {
  const next = root.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  localStorage.setItem(LS, next); applyTheme(next);
});

// ─── Timer Engine ─────────────────────────────
const MODES = {
  work:  { minutes: 25, label: '工作時間', c1: '#f472b6', c2: '#fb923c' },
  short: { minutes: 5,  label: '短休息',   c1: '#38bdf8', c2: '#2dd4bf' },
  long:  { minutes: 15, label: '長休息',   c1: '#a78bfa', c2: '#38bdf8' },
};
const CIRC = 2 * Math.PI * 105; // 659.73

let mode       = 'work';
let totalSecs  = 25 * 60;
let timeLeft   = totalSecs;
let running    = false;
let timer      = null;
let sessionIdx = 0; // 0-3 (4 pomodoros per round)
let todayPomodoros = 0;
let todayMinutes   = 0;
let todayStarted   = 0;
let history        = [];
let taskLogged     = {}; // taskId → extra minutes logged this session

// Task data (simulated; in prod this comes from Zustand store)
const tasks = {
  t1: { name: '實作 API 端點',      logged: 45, est: 120 },
  t2: { name: '撰寫測試案例',       logged: 30, est: 90  },
  t3: { name: '優化資料庫查詢',     logged: 0,  est: 60  },
  t4: { name: '設計通知系統架構',   logged: 15, est: 45  },
  t5: { name: '更新 CI/CD 流程',    logged: 0,  est: 180 },
};

// DOM refs
const display    = document.getElementById('timer-display');
const modeLabel  = document.getElementById('mode-label');
const ringProg   = document.getElementById('ring-prog');
const btnPlay    = document.getElementById('btn-play');
const playIcon   = document.getElementById('play-icon');
const pauseIcon  = document.getElementById('pause-icon');
const taskSel    = document.getElementById('task-select');
const taskInfo   = document.getElementById('task-info');
const grad1      = document.getElementById('grad-stop-1');
const grad2      = document.getElementById('grad-stop-2');
const histList   = document.getElementById('hist-list');
const liqRect    = document.getElementById('liquid-rect');
const liqWave    = document.getElementById('liquid-wave');
const liqStop1   = document.getElementById('liq-stop-1');
const liqStop2   = document.getElementById('liq-stop-2');

// Wave animation state
let waveOffset  = 0;
let waveRafId   = null;

function fmt(s) {
  const m = Math.floor(s/60), sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function setRing(left, total) {
  const pct = left / total;
  ringProg.style.strokeDashoffset = CIRC * (1 - pct);
  setLiquid(1 - pct); // fill INCREASES as time DECREASES
}

function setLiquid(fillPct) {
  // fillPct: 0 = empty (timer just started), 1 = full (timer done)
  // y goes from 220 (empty, off screen) → 20 (full, fills inner circle top)
  const yTop = 20 + 200 * (1 - fillPct);
  if (liqRect) liqRect.setAttribute('y', String(yTop));
  if (liqWave) liqWave.setAttribute('transform', `translate(0, ${yTop})`);
}

function startWaveLoop() {
  if (waveRafId) return;
  function loop() {
    waveOffset += 0.018;
    if (liqWave) {
      // Oscillate the wave path in X so it appears to ripple
      const shift = Math.sin(waveOffset) * 7;
      const fillPct = 1 - (timeLeft / totalSecs);
      const yTop = 20 + 200 * (1 - fillPct);
      liqWave.setAttribute('transform', `translate(${shift}, ${yTop})`);
    }
    waveRafId = requestAnimationFrame(loop);
  }
  waveRafId = requestAnimationFrame(loop);
}

function stopWaveLoop() {
  if (waveRafId) { cancelAnimationFrame(waveRafId); waveRafId = null; }
}

function setMode(m) {
  mode = m;
  const cfg = MODES[m];
  totalSecs = cfg.minutes * 60;
  timeLeft  = totalSecs;
  running   = false;
  clearInterval(timer);

  display.textContent  = fmt(timeLeft);
  modeLabel.textContent = cfg.label;
  modeLabel.style.color = cfg.c1;
  grad1.setAttribute('stop-color', cfg.c1);
  grad2.setAttribute('stop-color', cfg.c2);
  // sync liquid fill gradient to current mode colour
  if (liqStop1) liqStop1.setAttribute('stop-color', cfg.c1);
  if (liqStop2) liqStop2.setAttribute('stop-color', cfg.c2);
  btnPlay.style.boxShadow = `0 0 20px ${cfg.c1}55`;

  // also update ctrl-play gradient via inline style
  btnPlay.style.background = `linear-gradient(135deg, ${cfg.c1}, ${cfg.c2})`;

  setRing(timeLeft, totalSecs);
  showPlayIcon();

  // update mode tab
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === m);
  });
}

function showPlayIcon()  { playIcon.style.display='block'; pauseIcon.style.display='none'; }
function showPauseIcon() { playIcon.style.display='none';  pauseIcon.style.display='block'; }

function start() {
  if (timeLeft === 0) return;
  running = true; todayStarted++;
  showPauseIcon();
  startWaveLoop();

  timer = setInterval(() => {
    timeLeft--;
    display.textContent = fmt(timeLeft);
    setRing(timeLeft, totalSecs);
    if (timeLeft === 0) { clearInterval(timer); onComplete(); }
  }, 1000);
}

function pause() {
  running = false;
  clearInterval(timer);
  stopWaveLoop();
  showPlayIcon();
}

function reset() {
  pause();
  timeLeft = totalSecs;
  display.textContent = fmt(timeLeft);
  setRing(timeLeft, totalSecs);
}

function spawnCoins(cx, cy, count = 9) {
  for (let i = 0; i < count; i++) {
    const coin  = document.createElement('div');
    coin.className = 'pomo-coin';
    coin.textContent = '◆';
    const angle = (Math.PI * 2 / count) * i - Math.PI / 2;
    const dist  = 55 + Math.random() * 45;
    coin.style.setProperty('--cx', `${Math.cos(angle) * dist}px`);
    coin.style.setProperty('--cy', `${Math.sin(angle) * dist}px`);
    coin.style.left = `${cx}px`;
    coin.style.top  = `${cy}px`;
    coin.style.animationDelay = `${i * 0.045}s`;
    document.body.appendChild(coin);
    setTimeout(() => coin.remove(), 1200 + i * 50);
  }
}

function showCoinText(cx, cy, msg) {
  const el = document.createElement('div');
  el.className  = 'coin-text';
  el.textContent = msg;
  el.style.left = `${cx}px`;
  el.style.top  = `${cy}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1700);
}

function onComplete() {
  showPlayIcon();
  running = false;
  stopWaveLoop();

  const taskId   = taskSel.value;
  const taskName = taskId ? tasks[taskId]?.name : null;
  const dur      = MODES[mode].minutes;

  if (mode === 'work') {
    todayPomodoros++;
    todayMinutes += dur;

    // Update task logged time
    if (taskId && tasks[taskId]) {
      tasks[taskId].logged += dur;
      taskLogged[taskId] = (taskLogged[taskId] || 0) + dur;
      updateTaskInfo();
    }

    // Advance session dot
    updateDots(true);
    if (sessionIdx < 3) sessionIdx++;
    else { sessionIdx = 0; }

    addHistory('work', taskName, dur);
    updateStats();

    // — 🎉 Celebration: ring glow pulse + coin burst —
    const ringArea = document.getElementById('ring-area');
    ringArea?.classList.remove('complete-pulse');
    void ringArea?.offsetWidth;
    ringArea?.classList.add('complete-pulse');
    setTimeout(() => ringArea?.classList.remove('complete-pulse'), 900);

    // Coin burst centred on the ring
    const ringRect = ringArea?.getBoundingClientRect();
    if (ringRect) {
      const cx = ringRect.left + ringRect.width  / 2;
      const cy = ringRect.top  + ringRect.height / 2;
      spawnCoins(cx, cy, 10);
      showCoinText(cx, cy - 20, `🍅 × ${todayPomodoros}  完成！`);
    }

    // Ring notification
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('🍅 番茄鐘完成！', { body: taskName ? `${taskName} — 休息一下吧` : '休息一下吧' });
    }
  } else {
    addHistory('break', null, dur);
  }

  // Auto-suggest next mode
  setTimeout(() => {
    if (mode === 'work') setMode(sessionIdx % 4 === 0 ? 'long' : 'short');
  }, 800);
}

function updateDots(completeCurrentDot) {
  const dots = document.querySelectorAll('.s-dot');
  dots.forEach((d, i) => {
    d.classList.remove('done','current');
    if (i < sessionIdx)                        d.classList.add('done');
    else if (i === sessionIdx && !completeCurrentDot) d.classList.add('current');
    else if (i === sessionIdx && completeCurrentDot)  d.classList.add('done');
  });
  // Highlight next dot as current (for next session)
  if (completeCurrentDot) {
    const next = sessionIdx + 1;
    if (next <= 3) dots[next < 4 ? (sessionIdx < 3 ? sessionIdx+1 : 0) : 0]?.classList.add('current');
  }
}

function updateStats() {
  document.getElementById('stat-pomodoros').textContent = todayPomodoros;
  document.getElementById('stat-minutes').textContent   = todayMinutes;
  const rate = todayStarted > 0 ? Math.round((todayPomodoros/todayStarted)*100)+'%' : '—';
  document.getElementById('stat-rate').textContent = rate;
}

function addHistory(type, taskName, dur) {
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  history.unshift({ type, taskName, dur, time });

  if (histList.querySelector('div[style]')) histList.innerHTML = '';

  const el = document.createElement('div');
  el.className = 'hist-item';
  const emoji = type === 'work' ? '🍅' : '☕';
  const label = type === 'work' ? (taskName || '無指定任務') : '休息';
  el.innerHTML = `
    <div class="hist-icon ${type}">${emoji}</div>
    <div class="hist-info">
      <div class="hist-task">${label}</div>
      <div class="hist-time">${time}</div>
    </div>
    <div class="hist-dur">${dur}m</div>`;
  histList.prepend(el);
}

function updateTaskInfo() {
  const taskId = taskSel.value;
  if (!taskId || !tasks[taskId]) { taskInfo.style.display='none'; return; }
  const t = tasks[taskId];
  taskInfo.style.display = 'flex';
  document.getElementById('info-logged').textContent  = t.logged + 'm';
  document.getElementById('info-est').textContent     = t.est + 'm';
  const remain = Math.max(0, t.est - t.logged);
  document.getElementById('info-remain').textContent  = remain + 'm';
}

// ─── Event listeners ──────────────────────────
document.querySelectorAll('.mode-btn').forEach(b => {
  b.addEventListener('click', () => { if (!running) setMode(b.dataset.mode); });
});

btnPlay.addEventListener('click', () => { running ? pause() : start(); });
document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-skip').addEventListener('click', () => { pause(); onComplete(); });
taskSel.addEventListener('change', updateTaskInfo);

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// Init
setMode('work');
updateDots(false);
</script>
</body>
</html>
